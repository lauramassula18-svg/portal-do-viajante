<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promoção Especial</title>

   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

  
    <div class="voltar">
        <a href="../"> Voltar </a>
    </div>


    <section class="hero">

        <div class="overlay"></div>

        <div class="hero-content">
            <h1>PROMOÇÃO</h1>

            <div class="linha">
                <span></span>
                <div class="ponto"></div>
                <span></span>
            </div>
        </div>

    </section>

    <!-- FORMULÁRIO -->
    <section class="formulario">
        <div class="form">

            <h2>Cadastre-se aqui</h2>
            <p>Preencha os dados abaixo e entraremos em contato com as melhores ofertas para você.</p>

           
            <form action="" method="post">

                
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

                <label for="cidade">Cidade de onde vai</label>
                <input type="text" id="cidade" name="cidade" placeholder="Sua cidade" required>

                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone" placeholder="(00) 00000-0000" required>

               
                <label for="pessoas">Número de pessoas</label>
                <select id="pessoas" name="pessoas" required>
                    <option value="">Selecione</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3 </option>
                    <option value="4">4 </option>
                    <option value="5">5 </option>
                    <option value="6">6 </option>
                    <option value="7">7 </option>
                    <option value="8">8 </option>
                    <option value="9">9 </option>
                    <option value="10">10 </option>
                    <option value="11">11 </option>
                    <option value="12">12 </option>
                </select>

                <button type="submit">Enviar</button>

            </form>
        </div>
    </section>

</body>

</html>
